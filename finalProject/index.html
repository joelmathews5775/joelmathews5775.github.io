<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Final Project</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header>
    <h1 id="top">Nature's Best</h1>
  </header>

  <main>
    <p><cite><strong>"If you truly love nature, you will find beauty everywhere."</strong></cite> - Vincent Van Gogh</p>
    <p>Welcome to Nature's Best. You will find the pictures of the best places on earth here.</p>
    <div class = "grid">
        <figure>
        <img src="images/avenue_1920x1280.jpg" alt="Sunlight streaming through tall trees lining a dirt path in a dense green forest, with rays of light creating a peaceful and serene atmosphere" width="200">
        <figcaption>Tall Trees</figcaption>
        </figure>
        <figure>
        <img src="images/bali_1920x1280.jpg" alt="Dramatic coastal cliffs covered in green vegetation rising above turquoise ocean water with a small sandy beach below, surrounded by clear blue sea and lush greenery, evoking a sense of tranquility and natural beauty" width="200">
        <figcaption>Coastal Cliffs</figcaption>
        </figure>
        <figure>
        <img src="images/cliffs_1920x1280.jpg" alt="Towering red rock cliffs rise on both sides of a narrow canyon filled with green trees and shrubs under a bright sky with scattered clouds, creating a dramatic and awe-inspiring natural landscape" width="200">
        <figcaption>Red Mountains</figcaption>
        </figure>
        <figure>
        <img src="images/glacier_1920x1280.jpg" alt="Large iceberg floating in calm blue water with a group of birds perched on top under a clear sky, creating a tranquil and serene atmosphere in a cold arctic environment" width="200">
        <figcaption>Large Icebergs</figcaption>
        </figure>
        <figure>
        <img src="images/lake_1920x1280.jpg" alt="Calm lake reflecting dense green forest and mountains under a cloudy sky, with a small wooden dock in the distance creating a peaceful and tranquil atmosphere" width="200">
        <figcaption>Calm Lake 1</figcaption>
        </figure>
        <figure>
        <img src="images/rainbow_1920x1280.jpg" alt="Bright rainbow arcs across a cloudy sky above a lush green forest and calm blue water, creating a peaceful and uplifting atmosphere" width="200">
        <figcaption>Bright Rainbow</figcaption>
        </figure>
        <figure>
        <img src="images/sunset_1920x1280.jpg" alt="Snow-covered mountain peak partially shrouded in mist at dusk with a faint orange glow on the horizon and dark rocky slopes in the foreground creating a calm and tranquil atmosphere" width="200">
        <figcaption>Snowy Mountains</figcaption>
        </figure>
        <figure>
        <img src="images/trail_1920x1280.jpg" alt="Winding dirt path leading through a dense forest of tall pine trees with sunlight filtering through green and yellow foliage creating a peaceful and inviting atmosphere" width="200">
        <figcaption>Dense Forests</figcaption>
        </figure>
        <figure>
        <img src="images/water_1920x1280.jpg" alt="Clear turquoise lake with rocks in the shallow water at the shore, surrounded by dense green pine forest and tall misty mountains in the background, creating a peaceful and serene atmosphere" width="200">
        <figcaption>Calm Lake 2</figcaption>
        </figure>
    </div>
  </main>

  <footer>
    <a href="#top">Jump to the Top</a>
  </footer>
</body>

</html>
