<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Photo Gallery</title>
	<link rel="stylesheet" href="css/gallery.css">
	<script src = "js/gallery.js"></script>
</head>
<body onload="addTabIndex()">
	<main>
		<h1>Interactive Photo Gallery</h1>
		<div id="image">
			<div class="overlay">
				Hover over an image below to display here.
			</div>
		</div>
		<img class="preview" src="images/bora_bora_640x427.jpg" alt="A stunning view of a resort on Bora-Bora island." onmouseover="upDate(this)" onmouseout="unDo()" onfocus="upDate(this)" onblur="unDo()">
		<img class="preview" src="images/cliff_640x427.jpg" alt="A breathtaking view of a sea-side cliff with waves crashing." onmouseover="upDate(this)" onmouseout="unDo()" onfocus="upDate(this)" onblur="unDo()">
		<img class="preview" src="images/desert_640x427.jpg" alt="Sand dunes of the Sahara desert under a clear blue sky." onmouseover="upDate(this)" onmouseout="unDo()" onfocus="upDate(this)" onblur="unDo()">
		<img class="preview" src="images/mountain_640x427.jpg" alt="A scenic view of snow-covered mountains from a distance." onmouseover="upDate(this)" onmouseout="unDo()" onfocus="upDate(this)" onblur="unDo()">
		<img class="preview" src="images/sea_640x427.jpg" alt="A serene beach with a mountain range in the background." onmouseover="upDate(this)" onmouseout="unDo()" onfocus="upDate(this)" onblur="unDo()">
		<img class="preview" src="images/waterfall_640x427.jpg" alt="A beautiful waterfall surrounded by lush greenery." onmouseover="upDate(this)" onmouseout="unDo()" onfocus="upDate(this)" onblur="unDo()">
	</main>
</body>
</html>
